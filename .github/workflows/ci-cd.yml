name: CI-CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install deps
      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      # 4️⃣ Run tests
      - name: Run tests
        working-directory: ./backend
        run: |
          pytest tests || true

      # 5️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ai-backend ./backend

      # 6️⃣ Login to DockerHub
      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7️⃣ Push Docker image
      - name: Push Docker image
        run: |
          docker tag ai-backend ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest

      # 🚀 8️⃣ DEPLOY TO EC2 (THIS IS THE NEW PART)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 54.153.170.191
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest

            docker stop ai-backend || true
            docker rm ai-backend || true

            docker run -d \
              --name ai-backend \
              -p 8000:8000 \
              ${{ secrets.DOCKER_USERNAME }}/ai-backend:latest